<html>
    <head>
        <meta charset="utf-8">
        <title>使い方｜タイマー</title>
    </head>
    <body>
        <h1>タイマー　使い方</h1>
        <h2>直接入力して使う</h2>
        <p>①キーボードマークをクリック<br>②キーボードで入力<br>※Spaceキーで一文字削除、Enterキーで確定<br>③再生マークをクリック<br>※リセットすると元の設定した値に戻ります</p>
        <h2>プログラムして使う</h2>
        <p>①自動更新マークをクリック</p>
        <h3>A.コードを追加する</h3>
        <p>A-1 2を入力<br>A-2 プログラムを入力<br>※4ケタで長さを入力、;で区切り、*で繰り返しを指定</p>
        <h3>B.コードを選択する</h3>
        <p>B-1 選択したいコードの番号を入力</p>
        <h3>C.コードを削除する</h3>
        <p>C-1 削除したいコードの番号を入力</p>
    </body>
